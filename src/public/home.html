<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPortal | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        body {
            background: radial-gradient(circle at bottom right, #1e1b4b, #0f172a);
            overflow: hidden;
        }

        .glow {
            box-shadow: 0 0 50px -12px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen flex items-center justify-center relative">

    <div class="absolute top-20 left-20 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse"></div>

    <main class="text-center z-10 p-6 max-w-2xl">
        <div class="flex justify-center mb-8 animate__animated animate__fadeInDown">
            <div class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700 glow">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-400" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
            </div>
        </div>

        <h1
            class="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-6 animate__animated animate__fadeInUp">
            Welcome to the <span class="text-indigo-500">Platform</span>
        </h1>

        <p class="text-slate-400 text-lg md:text-xl mb-10 animate__animated animate__fadeInUp animate__delay-1s">
            The all-in-one developer workspace to build, register, and manage your applications with ease.
        </p>

        <div
            class="flex flex-col sm:flex-row gap-4 justify-center items-center animate__animated animate__fadeInUp animate__delay-2s">
            <a href="/register.html"
                class="w-full sm:w-auto px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/25 transition-all transform hover:-translate-y-1">
                Get Started
            </a>
            <a href="/login.html"
                class="w-full sm:w-auto px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl border border-slate-700 transition-all transform hover:-translate-y-1">
                Sign In
            </a>
            <button id="logoutBtn"
                class="w-full sm:w-auto px-8 py-4 bg-red-900/20 hover:bg-red-900/40 text-red-400 font-bold rounded-xl border border-red-900/50 transition-all transform hover:-translate-y-1">
                Sign Out
            </button>
        </div>
        <div class="mt-6 animate__animated animate__fadeInUp animate__delay-2s">
            <button id="becomeDevBtn"
                class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-blue-500 hover:from-indigo-500 hover:to-blue-400 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/20 transition-all transform hover:-translate-y-1">
                Become a Developer 🚀
            </button>
        </div>

        <div class="mt-16 pt-8 border-t border-slate-800/50 animate__animated animate__fadeIn animate__delay-3s">
            <p class="text-sm text-slate-500 uppercase tracking-widest font-semibold">Powering the next generation of
                apps</p>
        </div>
    </main>
    <script>
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try {
                const res = await fetch("/logout", { method: "POST" });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    window.location.reload();
                } else {
                    alert(data.error || "Logout failed");
                }
            } catch (err) {
                console.error(err);
                alert("Something went wrong");
            }
        });

        document.getElementById("becomeDevBtn").addEventListener("click", async () => {
            try {
                const res = await fetch("/become-developer", {
                    method: "POST"
                });

                const data = await res.json();

                if (res.ok) {
                    // success → go to dev dashboard
                    window.location.href = "/dev-dashboard.html";
                } else {
                    alert(data.error || "Failed to become developer");
                }

            } catch (err) {
                alert("Something went wrong");
                console.error(err);
            }
        });
    </script>
</body>

</html>
